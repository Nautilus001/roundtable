name: Build & Deploy

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: self-hosted
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: nautilus001
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nautilus001/roundtable:latest
            ghcr.io/nautilus001/roundtable:${{ github.ref_name }}
          build-args: |
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment: production

    steps:
      - name: Pull new image
        run: docker pull ghcr.io/nautilus001/roundtable:latest

      - name: Restart container
        run: |
          docker compose -f ~/roundtable/docker-compose.yml pull
          docker compose -f ~/roundtable/docker-compose.yml up -d
