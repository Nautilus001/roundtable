name: Build and Package Web App

on:
  push:
    branches: [main, master]
    paths:
        - 'src/**'
        - 'package.json'
        - 'package-lock.json'
        - 'Dockerfile'
        - 'nginx.conf'
  pull_request: 
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker img
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/roundtable:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/roundtable:${{github.sha}}
          build-args: |
            EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
